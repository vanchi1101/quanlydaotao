server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: stdmanager

  datasource:
    url: jdbc:sqlserver://localhost:${DB_PORT:1433};databaseName=stdmanager_db;trustServerCertificate=true
    username: sa
    password: 749516
    # Hibernate 6 tự nhận diện Driver, không nhất thiết phải khai báo thủ công

  jpa:
    open-in-view: false # Tắt OSIV để tránh lãng phí kết nối và lỗi tiềm ẩn
    hibernate:
      ddl-auto: validate # Sử dụng Flyway quản lý schema
    show-sql: true
    properties:
      hibernate:
        format_sql: true # Định dạng SQL cho dễ đọc trong log

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

# Cấu hình SpringDoc để Swagger hoạt động ổn định
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
  packages-to-scan: uni.it.stdmanager.modules # Giới hạn vùng quét để tránh lỗi 500

logging:
  level:
    root: INFO
    org.springdoc: DEBUG
    io.swagger: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE # Xem giá trị tham số SQL
    org.springframework.web: DEBUG # Xem chi tiết luồng Request/Response
