    <script>
      document.addEventListener('DOMContentLoaded', function () {
        const API_BASE = '/api/roles';
        const PAGE_SIZE = 8;
        const DEFAULT_SORT_FIELD = 'code';
        const DEFAULT_SORT_DIR = 'asc';

        let currentPage = 0;
        let totalPages = 0;
        let totalElements = 0;
        let activeFilterMode = 0;
        let serverTotalPages = 0;
        let serverTotalElements = 0;
        let loadMode = 'page';
        let isServerPaging = true;
        let currentSortField = DEFAULT_SORT_FIELD;
        let currentSortDir = DEFAULT_SORT_DIR;
        let allRoles = [];

        const roleTableBody = document.getElementById('roleTableBody');
        const pagination = document.getElementById('pagination');
        const paginationInfo = document.getElementById('paginationInfo');
        const searchInput = document.getElementById('searchInput');

        const roleModalEl = document.getElementById('roleModal');
        const roleModalTitle = document.getElementById('roleModalTitle');
        const roleIdInput = document.getElementById('roleId');
        const roleCodeInput = document.getElementById('roleCode');
        const roleNameInput = document.getElementById('roleName');
        const roleDescriptionInput = document.getElementById('roleDescription');
        const roleIsSystemInput = document.getElementById('roleIsSystem');
        const btnSaveRole = document.getElementById('btnSaveRole');
        const btnAdd = document.getElementById('btnAdd');
        const filterNameInput = document.getElementById('filterName');
        const filterCodeInput = document.getElementById('filterCode');
        const filterDescriptionInput = document.getElementById('filterDescription');
        const filterActiveSelect = document.getElementById('filterActive');
        const sortSelect = document.getElementById('sortSelect');
        const btnApplyFilters = document.getElementById('btnApplyFilters');
        const btnLoadAll = document.getElementById('btnLoadAll');
        const btnLoadActive = document.getElementById('btnLoadActive');
        const btnLoadPage = document.getElementById('btnLoadPage');
        const btnLoadSystem = document.getElementById('btnLoadSystem');

        const roleDetailModalEl = document.getElementById('roleDetailModal');
        const detailId = document.getElementById('detailId');
        const detailStatus = document.getElementById('detailStatus');
        const detailCode = document.getElementById('detailCode');
        const detailName = document.getElementById('detailName');
        const detailDescription = document.getElementById('detailDescription');
        const detailSystem = document.getElementById('detailSystem');

        var roleModal = null;
        if (window.bootstrap && roleModalEl) {
          roleModal = new window.bootstrap.Modal(roleModalEl);
        }
        var roleDetailModal = null;
        if (window.bootstrap && roleDetailModalEl) {
          roleDetailModal = new window.bootstrap.Modal(roleDetailModalEl);
        }

        function highlightText(text, term) {
          if (!term) return text;
          const escaped = term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
          const re = new RegExp(escaped, 'ig');
          return String(text || '').replace(re, function (m) {
            return '<mark>' + m + '</mark>';
          });
        }

        function normalizeText(value) {
          return (value || '')
            .toString()
            .toLowerCase()
            .normalize('NFD')
            .replace(/[\u0300-\u036f]/g, '')
            .replace(/Đ/g, 'd');
        }

        function isTrueishRoleSystem(value) {
          return value === true || value === 'true' || value === 1 || value === '1';
        }

        function getRoleSystemValue(role) {
          return isTrueishRoleSystem(role && (role.isSystem ?? role.system ?? role.is_system));
        }

        function renderTable(roles) {
          const term = searchInput.value.trim();
          roleTableBody.innerHTML = roles
            .map(function (r) {
              const isActive =
                typeof r.isActive === 'boolean'
                  ? r.isActive
                  : typeof r.active === 'boolean'
                    ? r.active
                    : true;
              const isSystem = getRoleSystemValue(r);
              const statusBadge = isActive
                ? '<span class="badge bg-success">Hoạt động</span>'
                : '<span class="badge bg-secondary">Đã khóa</span>';
              const systemBadge = isSystem
                ? '<span class="badge bg-warning text-dark">Yes</span>'
                : '<span class="badge bg-light text-dark">No</span>';
              const lockAction = isActive
                ? '<button class="btn btn-sm btn-outline-warning me-1" data-id="' +
                  r.id +
                  '" data-action="lock" title="Khóa">' +
                  '<i class="bi bi-lock"></i>' +
                  '</button>'
                : '<button class="btn btn-sm btn-outline-success me-1" data-id="' +
                  r.id +
                  '" data-action="unlock" title="Mở khóa">' +
                  '<i class="bi bi-unlock"></i>' +
                  '</button>';
              return (
                '<tr class="role-row" data-id="' +
                r.id +
                '">' +
                '<td>' +
                highlightText(r.code || '', term) +
                '</td>' +
                '<td>' +
                highlightText(r.name || '', term) +
                '</td>' +
                '<td>' +
                highlightText(r.description || '', term) +
                '</td>' +
                '<td>' +
                statusBadge +
                '</td>' +
                '<td>' +
                systemBadge +
                '</td>' +
                '<td class="text-end">' +
                lockAction +
                '<button class="btn btn-sm btn-outline-secondary me-1" data-id="' + r.id + '" data-action="edit">' +
                '<i class="bi bi-pencil"></i>' +
                '</button>' +
                '<button class="btn btn-sm btn-outline-danger" data-id="' + r.id + '" data-action="delete">' +
                '<i class="bi bi-trash"></i>' +
                '</button>' +
                '</td>' +
                '</tr>'
              );
            })
            .join('');

          const from = totalElements === 0 ? 0 : currentPage * PAGE_SIZE + 1;
          const to = Math.min((currentPage + 1) * PAGE_SIZE, totalElements);
          paginationInfo.textContent =
            'Hiển thị ' + from + '-' + to + ' trên tổng ' + totalElements + ' roles';

          renderPagination();
        }

        function applyFilterAndRender() {
          const term = normalizeText(searchInput.value.trim());
          const filtered = allRoles.filter(function (r) {
            if (!term) return true;
            return (
              normalizeText(r.code).includes(term) ||
              normalizeText(r.name).includes(term) ||
              normalizeText(r.description).includes(term)
            );
          });

          if (isServerPaging && !term) {
            totalElements = serverTotalElements;
            totalPages = serverTotalPages;
            renderTable(allRoles);
            return;
          }

          totalElements = filtered.length;
          totalPages = totalElements === 0 ? 0 : Math.ceil(totalElements / PAGE_SIZE);
          if (currentPage >= totalPages) {
            currentPage = Math.max(0, totalPages - 1);
          }

          const start = currentPage * PAGE_SIZE;
          const pageItems = filtered.slice(start, start + PAGE_SIZE);
          renderTable(pageItems);
        }

        function renderPagination() {
          if (totalPages === 0) {
            pagination.innerHTML = '';
            return;
          }

          var html = '';
          html +=
            '<li class="page-item ' +
            (currentPage === 0 ? 'disabled' : '') +
            '"><a class="page-link" href="#" data-page="' +
            (currentPage - 1) +
            '">&laquo;</a></li>';

          for (var i = 0; i < totalPages; i++) {
            html +=
              '<li class="page-item ' +
              (i === currentPage ? 'active' : '') +
              '"><a class="page-link" href="#" data-page="' +
              i +
              '">' +
              (i + 1) +
              '</a></li>';
          }

          html +=
            '<li class="page-item ' +
            (currentPage === totalPages - 1 ? 'disabled' : '') +
            '"><a class="page-link" href="#" data-page="' +
            (currentPage + 1) +
            '">&raquo;</a></li>';

          pagination.innerHTML = html;
        }

        pagination.addEventListener('click', function (e) {
          if (e.target.tagName !== 'A') return;
          e.preventDefault();
          const page = Number(e.target.getAttribute('data-page'));
          if (isNaN(page) || page === currentPage || page < 0 || page >= totalPages) return;
          currentPage = page;
          if (isServerPaging) {
            loadRoles();
          } else {
            applyFilterAndRender();
          }
        });

        searchInput.addEventListener('input', function () {
          currentPage = 0;
          applyFilterAndRender();
        });

        function setMode(mode) {
          loadMode = mode;
          isServerPaging = mode === 'page';
          currentPage = 0;
        }

        function buildSearchParams() {
          const name = filterNameInput ? filterNameInput.value.trim() : '';
          const code = filterCodeInput ? filterCodeInput.value.trim() : '';
          const description = filterDescriptionInput ? filterDescriptionInput.value.trim() : '';
          const params = new URLSearchParams();
          if (name) params.set('name', name);
          if (code) params.set('code', code);
          if (description) params.set('description', description);
          return params;
        }

        async function loadRoles() {
          if (loadMode === 'search') return loadRolesSearch();
          if (loadMode === 'active') return loadRolesActive();
          if (loadMode === 'system') return loadRolesSystem();
          if (loadMode === 'all') return loadRolesAll();
          return loadRolesPage();
        }

        async function loadRolesPage() {
          try {
            currentSortField = sortSelect ? sortSelect.value.split(',')[0] || DEFAULT_SORT_FIELD : DEFAULT_SORT_FIELD;
            currentSortDir = sortSelect ? sortSelect.value.split(',')[1] || DEFAULT_SORT_DIR : DEFAULT_SORT_DIR;
            const params = new URLSearchParams({
              page: String(currentPage),
              size: String(PAGE_SIZE),
              sortField: currentSortField,
              sortDir: currentSortDir,
            });
            const res = await fetch(API_BASE + '/page?' + params.toString());
            const data = await res.json();
            allRoles = Array.isArray(data.content) ? data.content : [];
            serverTotalElements = typeof data.totalElements === 'number' ? data.totalElements : 0;
            serverTotalPages = typeof data.totalPages === 'number' ? data.totalPages : 0;
            applyFilterAndRender();
          } catch (e) {
            console.error('Lỗi tải danh sách roles theo trang', e);
          }
        }

        async function loadRolesAll() {
          try {
            const res = await fetch(API_BASE);
            const data = await res.json();
            allRoles = Array.isArray(data) ? data : [];
            applyFilterAndRender();
          } catch (e) {
            console.error('Lỗi tải danh sách roles', e);
          }
        }

        async function loadRolesSearch() {
          try {
            const params = buildSearchParams();
            if ([...params.keys()].length === 0) return loadRolesAll();
            const res = await fetch(API_BASE + '/search?' + params.toString());
            const data = await res.json();
            allRoles = Array.isArray(data) ? data : [];
            applyFilterAndRender();
          } catch (e) {
            console.error('Lỗi tìm kiếm roles', e);
          }
        }

        async function loadRolesActive(isActive) {
          try {
            const activeValue =
              typeof isActive === 'boolean'
                ? isActive
                  ? 'true'
                  : 'false'
                : filterActiveSelect
                  ? filterActiveSelect.value
                  : 'true';
            if (activeValue === '') return loadRolesAll();
            const params = new URLSearchParams({ isActive: activeValue });
            const res = await fetch(API_BASE + '/active?' + params.toString());
            const data = await res.json();
            allRoles = Array.isArray(data) ? data : [];
            applyFilterAndRender();
          } catch (e) {
            console.error('Lỗi lọc roles theo trạng thái', e);
          }
        }

        async function loadRolesSystem() {
          try {
            const res = await fetch(API_BASE + '/system');
            const data = await res.json();
            allRoles = Array.isArray(data) ? data : [];
            applyFilterAndRender();
          } catch (e) {
            console.error('Lỗi tải roles hệ thống', e);
          }
        }

        let currentEditingRole = null;

        function openAddModal() {
          if (!roleModal) return;
          currentEditingRole = null;
          roleIdInput.value = '';
          roleCodeInput.value = '';
          roleNameInput.value = '';
          roleDescriptionInput.value = '';
          roleIsSystemInput.checked = false;
          roleModalTitle.textContent = 'Thêm role';
          btnSaveRole.dataset.mode = 'create';
          roleModal.show();
        }

        function openEditModal(role) {
          if (!roleModal) return;
          currentEditingRole = role || {};
          roleIdInput.value = role.id;
          roleCodeInput.value = role.code || '';
          roleNameInput.value = role.name || '';
          roleDescriptionInput.value = role.description || '';
          roleIsSystemInput.checked = getRoleSystemValue(role);
          roleModalTitle.textContent = 'Cập nhật role';
          btnSaveRole.dataset.mode = 'update';
          roleModal.show();
        }

        btnAdd.addEventListener('click', openAddModal);

        if (
          btnApplyFilters &&
          filterNameInput &&
          filterCodeInput &&
          filterDescriptionInput &&
          filterActiveSelect
        ) {
          btnApplyFilters.addEventListener('click', function () {
            const hasSearch =
              filterNameInput.value.trim() ||
              filterCodeInput.value.trim() ||
              filterDescriptionInput.value.trim();
            const activeValue = filterActiveSelect.value;

            if (hasSearch) {
              setMode('search');
            } else if (activeValue !== '') {
              setMode('active');
            } else {
              setMode('page');
            }
            loadRoles();
          });
        }

        if (btnLoadAll) {
          btnLoadAll.addEventListener('click', function () {
            setMode('all');
            loadRoles();
          });
        }

        if (btnLoadActive) {
          btnLoadActive.addEventListener('click', function () {
            activeFilterMode = (activeFilterMode + 1) % 3;
            if (activeFilterMode === 1) {
              btnLoadActive.innerHTML =
                '<i class="bi bi-check-circle me-1"></i> Đang hoạt động';
              setMode('active');
              loadRolesActive(true);
            } else if (activeFilterMode === 2) {
              btnLoadActive.innerHTML = '<i class="bi bi-slash-circle me-1"></i> Đã khóa';
              setMode('active');
              loadRolesActive(false);
            } else {
              btnLoadActive.innerHTML = '<i class="bi bi-filter-circle me-1"></i> Tất cả';
              setMode('all');
              loadRolesAll();
            }
          });
          btnLoadActive.innerHTML = '<i class="bi bi-filter-circle me-1"></i> Tất cả';
        }

        if (btnLoadSystem) {
          btnLoadSystem.addEventListener('click', function () {
            setMode('system');
            loadRoles();
          });
        }

        if (btnLoadPage) {
          btnLoadPage.addEventListener('click', function () {
            setMode('page');
            loadRoles();
          });
        }

        if (sortSelect) {
          sortSelect.addEventListener('change', function () {
            if (loadMode === 'page') {
              currentPage = 0;
              loadRoles();
            }
          });
        }

        roleTableBody.addEventListener('click', function (e) {
          const btn = e.target.closest('button[data-action]');
          if (btn) {
            const id = btn.getAttribute('data-id');
            const action = btn.getAttribute('data-action');
            if (action === 'edit') {
              fetch(API_BASE + '/' + id)
                .then(function (res) {
                  return res.json();
                })
                .then(function (role) {
                  openEditModal(role || {});
                })
                .catch(function () {
                  alert('Không tải được thông tin role.');
                });
            } else if (action === 'lock') {
              lockRole(id);
            } else if (action === 'unlock') {
              unlockRole(id);
            } else if (action === 'delete') {
              const row = e.target.closest('tr.role-row');
              const roleInList = row ? allRoles.find(function(r) { return String(r.id) === String(id); }) : null;
              if (roleInList && getRoleSystemValue(roleInList)) {
                alert('Đây là role mặc định của hệ thống không thể xóa');
                return;
              }
              if (confirm('Bạn có chắc chắn muốn xóa role này?')) {
                deleteRole(id);
              }
            }
            return;
          }

          const row = e.target.closest('tr.role-row');
          if (!row) return;
          const id = row.getAttribute('data-id');
          if (!id) return;
          fetch(API_BASE + '/' + id)
            .then(function (res) {
              return res.json();
            })
            .then(function (role) {
              const isActive =
                typeof role.isActive === 'boolean'
                  ? role.isActive
                  : typeof role.active === 'boolean'
                    ? role.active
                    : true;
              const isSystem = getRoleSystemValue(role);
              detailId.value = role.id || '';
              detailStatus.value = isActive ? 'Hoạt động' : 'Đã khóa';
              detailCode.value = role.code || '';
              detailName.value = role.name || '';
              detailDescription.value = role.description || '';
              detailSystem.value = isSystem ? 'Yes' : 'No';
              if (roleDetailModal) roleDetailModal.show();
            })
            .catch(function () {
              alert('Không tải được thông tin role.');
            });
        });

        async function saveRole() {
          const mode = btnSaveRole.dataset.mode;
          const code = roleCodeInput.value.trim();
          const name = roleNameInput.value.trim();
          const description = roleDescriptionInput.value.trim();
          const isSystem = roleIsSystemInput.checked;

          if (!code || !name) {
            alert('Vui lòng nhập đầy đủ code và tên.');
            return;
          }

          const isUpdate = mode === 'update';
          const id = roleIdInput.value;

          if (isUpdate && isSystem && getRoleSystemValue(currentEditingRole)) {
            alert('Đây là role mặc định của hệ thống, không thể sửa');
            return;
          }

          const payload = {
            code: code,
            name: name,
            description: description,
            isSystem: isSystem,
            is_system: isSystem,
            system: isSystem,
            isActive: isUpdate
              ? currentEditingRole && typeof currentEditingRole.isActive === 'boolean'
                ? currentEditingRole.isActive
                : true
              : true,
          };

          const url = isUpdate ? API_BASE + '/' + id : API_BASE;
          const method = isUpdate ? 'PUT' : 'POST';

          try {
            const res = await fetch(url, {
              method: method,
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(payload),
            });
            if (!res.ok) throw new Error(await res.text());
            if (roleModal) roleModal.hide();
            await loadRoles();
          } catch (e) {
            console.error('Lỗi lưu role', e);
            alert('Có lỗi xảy ra khi lưu role.');
          }
        }

        btnSaveRole.addEventListener('click', saveRole);

        async function deleteRole(id) {
          try {
            const res = await fetch(API_BASE + '/' + id, { method: 'DELETE' });
            if (!res.ok) throw new Error(await res.text());
            await loadRoles();
          } catch (e) {
            console.error('Lỗi xóa role', e);
            alert('Có lỗi xảy ra khi xóa role.');
          }
        }

        async function lockRole(id) {
          try {
            const res = await fetch(API_BASE + '/' + id + '/lock', { method: 'PUT' });
            if (!res.ok) throw new Error(await res.text());
            await loadRoles();
          } catch (e) {
            console.error('Lỗi khóa role', e);
            alert('Có lỗi xảy ra khi khóa role.');
          }
        }

        async function unlockRole(id) {
          try {
            const res = await fetch(API_BASE + '/' + id + '/unlock', { method: 'PUT' });
            if (!res.ok) throw new Error(await res.text());
            await loadRoles();
          } catch (e) {
            console.error('Lỗi mở khóa role', e);
            alert('Có lỗi xảy ra khi mở khóa role.');
          }
        }

        const SELECTOR_SIDEBAR_WRAPPER = '.sidebar-wrapper';
        const Default = {
          scrollbarTheme: 'os-theme-light',
          scrollbarAutoHide: 'leave',
          scrollbarClickScroll: true,
        };
        const sidebarWrapper = document.querySelector(SELECTOR_SIDEBAR_WRAPPER);
        if (sidebarWrapper && window.OverlayScrollbarsGlobal && window.OverlayScrollbarsGlobal.OverlayScrollbars) {
          window.OverlayScrollbarsGlobal.OverlayScrollbars(sidebarWrapper, {
            scrollbars: {
              theme: Default.scrollbarTheme,
              autoHide: Default.scrollbarAutoHide,
              clickScroll: Default.scrollbarClickScroll,
            },
          });
        }

        if (sortSelect) sortSelect.value = `${DEFAULT_SORT_FIELD},${DEFAULT_SORT_DIR}`;
        setMode('page');
        loadRoles();
      });
    </script>
  </body>
</html>
